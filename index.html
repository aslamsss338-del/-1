<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>لعبة الديناصور المتقدمة</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #f7f7f7;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            background-color: #ffffff;
            border-bottom: 3px solid #535353;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
            max-width: 100%; max-height: 100%;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- 1. النظام الصوتي المحسّن (AudioContext واحد مشترك) ---
const AudioManager = {
    ctx: null,
    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },
    play(freq, duration, type = "sine", vol = 0.1) {
        this.init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
        
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }
};

// --- 2. نظام حفظ السكور (localStorage) ---
const ScoreManager = {
    getHighScore() { return localStorage.getItem("dino_highscore") || 0; },
    saveHighScore(score) {
        if (score > this.getHighScore()) {
            localStorage.setItem("dino_highscore", score);
        }
    }
};

// --- 3. حالة اللعبة العامة ---
const Game = {
    state: "START", // START, PLAYING, GAMEOVER
    score: 0,
    highScore: ScoreManager.getHighScore(),
    deathCount: 0,
    speed: 6,
    baseSpeed: 6,
    maxSpeed: 13,
    distanceTraveled: 0,
    nextObstacleDist: 400,
    dayNightTimer: 0,
    isNight: false,
    bgColor: "#ffffff",
    textColor: "#535353",
    groundX: 0
};

// --- 4. نظام البيئة والخلفية (السحب والأرض والليل والنهار) ---
const Clouds = {
    list: [],
    update() {
        if (Math.random() < 0.005 && this.list.length < 5) {
            this.list.push({ x: canvas.width, y: Math.random() * 80 + 20, speed: Math.random() * 0.5 + 0.2 });
        }
        this.list.forEach(c => c.x -= c.speed);
        this.list = this.list.filter(c => c.x > -60);
    },
    draw() {
        ctx.fillStyle = Game.isNight ? "#444" : "#e0e0e0";
        this.list.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, 15, 0, Math.PI * 2);
            ctx.arc(c.x + 15, c.y - 5, 20, 0, Math.PI * 2);
            ctx.arc(c.x + 35, c.y, 15, 0, Math.PI * 2);
            ctx.fill();
        });
    }
};

function drawGround() {
    ctx.strokeStyle = Game.isNight ? "#444" : "#e0e0e0";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 260); ctx.lineTo(canvas.width, 260);
    ctx.stroke();
    
    // حركة النقاط على الأرض لإعطاء إيحاء بالسرعة
    ctx.fillStyle = Game.textColor;
    Game.groundX -= Game.speed;
    if (Game.groundX <= -100) Game.groundX = 0;
    for (let i = 0; i < canvas.width + 100; i += 100) {
        ctx.fillRect(i + Game.groundX, 265, 15, 2);
        ctx.fillRect(i + Game.groundX + 40, 275, 5, 2);
    }
}

// --- 5. كائن الديناصور (الأنيميشن والفيزياء الفورية) ---
const Dino = {
    x: 60, y: 220, width: 40, height: 44,
    vy: 0, gravity: 0.65, jumpForce: -11.5,
    isJumping: false, animFrame: 0, animTimer: 0,
    
    update() {
        // فيزياء الحركة وحل مشكلة تأخر القفز بالفحص المباشر والسريع
        this.vy += this.gravity;
        this.y += this.vy;
        
        if (this.y >= 216) { 
            this.y = 216; this.vy = 0; this.isJumping = false; 
        }
        
        // تغيير فريمات أنيميشن الجري
        if (!this.isJumping && Game.state === "PLAYING") {
            this.animTimer += Game.speed * 0.03;
            this.animFrame = Math.floor(this.animTimer) % 2;
        } else {
            this.animFrame = 2; // فريم القفز الثابت
        }
    },
    draw() {
        ctx.fillStyle = Game.textColor;
        let x = this.x, y = this.y;
        
        // رسم الديناصور بدقة البكسل (Pixel-art مبرمج يدوياً)
        ctx.fillRect(x + 15, y, 20, 12); // الرأس
        ctx.fillRect(x + 30, y + 4, 10, 4);  // الفم
        ctx.fillRect(x + 10, y + 12, 20, 20); // الجسم
        ctx.fillRect(x, y + 16, 10, 10);     // الذيل
        
        // أعين الديناصور تفتح وتغلق حسب الليل والنهار
        ctx.fillStyle = Game.bgColor;
        ctx.fillRect(x + 20, y + 3, 3, 3);
        ctx.fillStyle = Game.textColor;

        // رجلين الديناصور التبادلية (أنيميشن الجري)
        if (this.animFrame === 0) {
            ctx.fillRect(x + 14, y + 32, 4, 12); // رجل 1 لأسفل
            ctx.fillRect(x + 22, y + 32, 4, 6);  // رجل 2 معلقة
        } else if (this.animFrame === 1) {
            ctx.fillRect(x + 14, y + 32, 4, 6);
            ctx.fillRect(x + 22, y + 32, 4, 12);
        } else { // القفز
            ctx.fillRect(x + 14, y + 32, 4, 8);
            ctx.fillRect(x + 22, y + 32, 4, 8);
        }
    },
    jump() {
        // القفز الفوري والاستجابة اللحظية دون أي Delay
        if (!this.isJumping) {
            this.vy = this.jumpForce;
            this.isJumping = true;
            AudioManager.play(250, 0.1, "square", 0.08);
        }
    }
};

// --- 6. نظام العقبات الذكي (صبار متعدد الأشكال وطيور متحركة) ---
let obstacles = [];
const ObstacleManager = {
    types: ["cactus_small", "cactus_large", "cactus_group", "bird_low", "bird_high"],
    
    spawn() {
        // منع الحالات المستحيلة بربط نوع العائق بالسرعة والمسافة الدنيا الآمنة
        let randType = this.types[Math.floor(Math.random() * this.types.length)];
        
        // الطيور لا تظهر إلا بعد سكور 8 لمنح اللاعب فرصة للتأقلم
        if (Game.score < 8 && randType.startsWith("bird")) randType = "cactus_small";

        let obs = { type: randType, x: canvas.width, width: 20, height: 35, y: 225, anim: 0 };
        
        if (randType === "cactus_large") { obs.height = 48; obs.y = 212; obs.width = 24; }
        else if (randType === "cactus_group") { obs.width = 45; obs.height = 38; obs.y = 222; }
        else if (randType === "bird_low") { obs.y = 225; obs.width = 35; obs.height = 25; }
        else if (randType === "bird_high") { obs.y = 155; obs.width = 35; obs.height = 25; } // مستوى القفزة تماماً
        
        obstacles.push(obs);
    },
    update() {
        Game.distanceTraveled += Game.speed;
        if (Game.distanceTraveled >= Game.nextObstacleDist) {
            this.spawn();
            Game.distanceTraveled = 0;
            // حل مشكلة المسافات المستحيلة: الحد الأدنى ديناميكي ومحمي بـ (320 بكسل) كأمان تام للاعب
            let minDistance = Math.max(320, Game.speed * 32); 
            Game.nextObstacleDist = Math.floor(Math.random() * 250) + minDistance;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= Game.speed;

            // أنيميشن أجنحة الطيور
            if (o.type.startsWith("bird")) {
                o.anim += 0.15;
            }

            // فحص التصادم الدقيق مع تقليص حجم منطقة التصادم (Hitbox Padding) لعدم ظلم اللاعب
            let pad = 4;
            if (Dino.x + pad < o.x + o.width - pad &&
                Dino.x + Dino.width - pad > o.x + pad &&
                Dino.y + pad < o.y + o.height - pad &&
                Dino.y + Dino.height - pad > o.y + pad) {
                endGame();
            }

            if (o.x < -60) {
                obstacles.splice(i, 1);
                Game.score++;
                AudioManager.play(550, 0.04, "sine", 0.05); // صوت النقطة
                ScoreManager.saveHighScore(Game.score);
                Game.highScore = ScoreManager.getHighScore();
            }
        }
    },
    draw() {
        ctx.fillStyle = Game.textColor;
        obstacles.forEach(o => {
            let x = o.x, y = o.y;
            if (o.type === "cactus_small") {
                ctx.fillRect(x + 8, y, 6, 35); ctx.fillRect(x, y + 10, 8, 6); ctx.fillRect(x + 14, y + 14, 8, 6);
            } else if (o.type === "cactus_large") {
                ctx.fillRect(x + 9, y, 7, 48); ctx.fillRect(x, y + 12, 10, 7); ctx.fillRect(x + 15, y + 18, 10, 7);
            } else if (o.type === "cactus_group") { // صبار ثلاثي متجاور
                ctx.fillRect(x + 5, y + 8, 5, 30); ctx.fillRect(x + 18, y, 6, 38); ctx.fillRect(x + 32, y + 12, 5, 26);
            } else if (o.type.startsWith("bird")) { // رسم الطائر مع حركة جناح علوي وسفلي
                ctx.fillRect(x + 10, y + 5, 20, 10); ctx.fillRect(x, y + 8, 10, 4); // الجسم والمنقار
                if (Math.floor(o.anim) % 2 === 0) {
                    ctx.fillRect(x + 12, y, 6, 6); // جناح لأعلى
                } else {
                    ctx.fillRect(x + 12, y + 15, 6, 8); // جناح لأسفل
                }
            }
        });
    }
};

// --- 7. منطق دورة النهار والليل وتدرج الصعوبة ---
function updateEnvironment() {
    // تدرج صعوبة اللعب بسلاسة متناهية (بأجزاء من العشرة بناءً على السكور)
    Game.speed = Math.min(Game.maxSpeed, Game.baseSpeed + (Game.score * 0.15));

    // دورة ليل ونهار متكاملة كل 25 نقطة
    Game.dayNightTimer++;
    if (Game.score > 0 && Game.score % 25 === 0) {
        if (!Game.isNight && Game.dayNightTimer > 100) { Game.isNight = true; Game.dayNightTimer = 0; }
    } else if (Game.score % 25 !== 0 && Game.isNight && Game.dayNightTimer > 500) {
        Game.isNight = false; Game.dayNightTimer = 0;
    }

    Game.bgColor = Game.isNight ? "#222222" : "#ffffff";
    Game.textColor = Game.isNight ? "#f1f1f1" : "#535353";
    canvas.style.backgroundColor = Game.bgColor;
}

// --- 8. شاشات اللعبة والواجهات (بداية، نهاية، طرد النوب) ---
function drawUI() {
    ctx.fillStyle = Game.textColor;
    ctx.font = "bold 16px monospace";
    ctx.textAlign = "left";
    ctx.fillText(`HI: ${String(Game.highScore).padStart(5, '0')}  ${String(Game.score).padStart(5, '0')}`, canvas.width - 160, 30);
    
    if (Game.state === "START") {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = Game.textColor;
        ctx.textAlign = "center";
        ctx.font = "bold 26px sans-serif"; ctx.fillText("لعبة الديناصور المطورة", canvas.width/2, canvas.height/2 - 30);
        ctx.font = "16px sans-serif"; ctx.fillText("اضغط مسافة أو المس الشاشة للبدء والقفز", canvas.width/2, canvas.height/2 + 20);
    } 
    else if (Game.state === "GAMEOVER") {
        ctx.fillStyle = "rgba(231, 76, 60, 0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.textAlign = "center";
        ctx.fillStyle = "#e74c3c"; ctx.font = "bold 22px sans-serif";
        
        let msg = "حاول مجدداً";
        if (Game.deathCount >= 30) msg = "سئمت منك أيها النوب";
        else if (Game.deathCount >= 20) msg = "أنا أسف لكن هذه اللعبة ليست مناسبة لأمثالك";
        else if (Game.deathCount >= 10) msg = "لو لعبت بأصابع أرجلك لكان أدائك أفضل";
        else if (Game.deathCount >= 5) msg = "حاول أكثر";
        
        ctx.fillText(msg, canvas.width/2, canvas.height/2 - 25);
        
        if (Game.deathCount < 30) {
            // زر إعادة اللعب الإحترافي
            ctx.fillStyle = Game.textColor; ctx.font = "16px sans-serif";
            ctx.fillText("🎮 انقر أو اضغط مسافة لإعادة المحاولة", canvas.width/2, canvas.height/2 + 25);
        }
    }
}

// --- 9. التحكم بالإدخال والتفاعل (استجابة فورية وحماية التوجيه اللمسي) ---
function handleInput(e) {
    if (e.type === "keydown" && e.code !== "Space" && e.code !== "ArrowUp") return;
    
    AudioManager.init(); // تفعيل الصوت مع أول ضغطة حقيقية للمستخدم لتخطي حظر المتصفحات
    
    if (Game.state === "PLAYING") {
        Dino.jump();
    } else if (Game.state === "START") {
        Game.state = "PLAYING";
    } else if (Game.state === "GAMEOVER" && Game.deathCount < 30) {
        resetGame();
    }
}

document.addEventListener("keydown", handleInput);
canvas.addEventListener("touchstart", function(e) {
    e.preventDefault(); // حل مشكلة الـ Delay والزوم التلقائي في الموبايل
    handleInput(e);
}, { passive: false });

function endGame() {
    Game.state = "GAMEOVER";
    Game.deathCount++;
    AudioManager.play(90, 0.3, "sawtooth", 0.15); // صوت الموت الخشن الثابت
    
    if (Game.deathCount >= 30) {
        setTimeout(() => { window.location.href = "https://www.google.com"; }, 2000);
    }
}

function resetGame() {
    obstacles = [];
    Game.score = 0;
    Game.speed = Game.baseSpeed;
    Game.state = "PLAYING";
    Game.distanceTraveled = 0;
    Game.nextObstacleDist = 400;
    Dino.y = 216; Dino.vy = 0; Dino.isJumping = false;
}

// --- 10. حلقة اللعبة الأساسية (Game Loop) ---
function loop() {
    updateEnvironment();
    
    if (Game.state === "PLAYING") {
        Clouds.update();
        Dino.update();
        ObstacleManager.update();
    }
    
    // مسح الشاشة والرسم
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    Clouds.draw();
    drawGround();
    Dino.draw();
    ObstacleManager.draw();
    drawUI();
    
    requestAnimationFrame(loop);
}

// بدء تشغيل اللعبة
loop();
</script>

</body>
</html>
