<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الديناصور للمتصفح</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        canvas {
            background-color: #ffffff;
            border-bottom: 2px solid #535353;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
            max-width: 100%;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="300"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // إعدادات الديناصور
    let dino = { x: 50, y: 220, width: 40, height: 40, vy: 0, gravity: 0.6, jumpForce: -12, isJumping: false };
    
    // إعدادات العقبات (الصبار)
    let obstacles = [];
    let obstacleTimer = 0;
    let score = 0;
    let isGameOver = false;

    // استشعار النقر على الشاشة أو الضغط على الأزرار للقفز
    document.addEventListener("keydown", function(e) { if (e.code === "Space") triggerJump(); });
    canvas.addEventListener("touchstart", function() { triggerJump(); });

    function triggerJump() {
        if (!dino.isJumping && !isGameOver) {
            dino.vy = dino.jumpForce;
            dino.isJumping = true;
        }
        if (isGameOver) {
            resetGame();
        }
    }

    function resetGame() {
        obstacles = [];
        score = 0;
        isGameOver = false;
        dino.y = 220;
        dino.vy = 0;
        dino.isJumping = false;
        gameLoop();
    }

    function gameLoop() {
        if (isGameOver) {
            ctx.fillStyle = "#535353";
            ctx.font = "30px sans-serif";
            ctx.fillText("Game Over! انقر لإعادة اللعب", canvas.width/2 - 180, canvas.height/2);
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. تحديث حركة الديناصور (الجاذبية)
        dino.vy += dino.gravity;
        dino.y += dino.vy;
        if (dino.y >= 220) { dino.y = 220; dino.vy = 0; dino.isJumping = false; }

        // رسم الديناصور (مربع رمادي بسيط مثل الديناصور الأصلي)
        ctx.fillStyle = "#535353";
        ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

        // 2. توليد العقبات وتحديث حركتها
        obstacleTimer++;
        if (obstacleTimer % 100 === 0) {
            obstacles.push({ x: canvas.width, y: 230, width: 20, height: 30 });
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= 6; // سرعة حركة العقبة لليسار

            // رسم العقبة (الصبار)
            ctx.fillStyle = "#8a8a8a";
            ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].width, obstacles[i].height);

            // التحقق من التصادم بين الديناصور والعقبة
            if (dino.x < obstacles[i].x + obstacles[i].width &&
                dino.x + dino.width > obstacles[i].x &&
                dino.y < obstacles[i].y + obstacles[i].height &&
                dino.y + dino.height > obstacles[i].y) {
                isGameOver = true;
            }

            // حذف العقبة إذا خرجت من الشاشة وزيادة النتيجة
            if (obstacles[i].x < -20) {
                obstacles.splice(i, 1);
                score++;
            }
        }

        // 3. رسم النتيجة
        ctx.fillStyle = "#535353";
        ctx.font = "20px sans-serif";
        ctx.fillText("النتيجة: " + score, 20, 30);

        requestAnimationFrame(gameLoop);
    }

    // تشغيل اللعبة تلقائياً عند فتح الصفحة
    gameLoop();
</script>

</body>
</html>
